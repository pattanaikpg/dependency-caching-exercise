name: With Cache

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO: Add actions/cache@v4 for the npm cache
      # - uses: actions/cache@v4
      #   with:
      #     path: ~/.npm                              ⬅️ npm's cache directory
      #     key: ???                                  ⬅️ should include OS + lock file hash
      #     restore-keys: ???                         ⬅️ fallback: OS-only prefix

      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO: Add the same cache step here
      # Hint: use the exact same key/restore-keys — the cache is shared across jobs

      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # TODO: Add the same cache step here

      - run: npm ci
      - run: npm run build
